<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="gaming-loading">
        <div class="first-page h-100 w-100">
            <nav class="navbar pt-5">
                <img src="./Assets/Icons/Logo.svg" alt="Gaming Logo">
                <ul class="text-light d-flex list-unstyled gap-5">
                    <li>Home</li>
                    <li>Categories</li>
                    <li>How it Works</li>
                    <li>Pricing</li>
                </ul>
                <div class="btn-section">
                    <button class="btn text-light p-3 rounded-0">Sign Up</button>
                    <button class="btn btn-danger p-3 rounded-0">Sign In</button>
                </div>
            </nav>
            <div class="hero-section mt-5">
                <div class="row">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-5">
                        <h1 class="heading text-light fw-bolder pt-5 lh-base">Play Game Everytime Always Be Winner And
                            Strong</h1>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-6">
                        <p class="suggetion text-secondary fw-semibold lh-base fs-5">Improve your gaming skills by
                            playing games that
                            are currently popular so that you don't go out of
                            style improve skills</p>
                    </div>
                    <img src="./Assets/Icons/playButton.svg" alt="Play Buttom" class="play-buttom">
                </div>
                <div class=" button-btn-section row align-items-center mt-5">

                    <div class="col-12 col-md-6">
                        <div class="d-flex gap-4">
                            <button class="btn rounded-0 text-white"
                                style="background-color: #f77058; padding: 12px 35px; font-weight: 500;">Get
                                started</button>
                            <button class="btn text-white rounded-0 border border-light"
                                style="padding: 12px 35px; background: transparent;">Learn more</button>
                        </div>
                    </div>

                    <div class=" col-12 col-md-6 d-flex justify-content-md-end mt-4 mt-md-0">

                        <div class="d-flex text-light">

                            <div
                                style="width: 45px; height: 2px; background-color: white; margin-top: 14px; margin-right: 15px;">
                            </div>

                            <div class="text-start" style="font-size:2rem; line-height: 1.6;">
                                The King Of Terania<br>
                                And Last Season<br>

                                <div class="d-flex align-items-center justify-content-between"
                                    style="min-width: 260px;">
                                    <span>XXIV</span>
                                    <img src="./Assets/Icons/nextArrow.svg" alt="Next Arrow" style="width: 50px;">
                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
